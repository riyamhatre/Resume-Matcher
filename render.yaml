services:
  - type: web
    name: resume-matcher
    env: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python nltk_downloader.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
